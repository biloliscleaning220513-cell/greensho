{% load static %}
<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-content {
            max-width: 1200px;
            margin: auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LOGO */
        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            background: linear-gradient(45deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            color: transparent;
        }

        /* NAV RIGHT */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* ICONS */
        .nav-icon {
            font-size: 18px;
            color: #cbd5f5;
            transition: 0.3s;
        }

        .nav-icon:hover {
            color: #4ade80;
        }

        /* USER */
        .user-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.15);
            padding: 8px 14px;
            border-radius: 50px;
            color: #4ade80;
            font-weight: 600;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-login {
            border: 1px solid #4ade80;
            color: #4ade80;
        }

        .btn-login:hover {
            background: #4ade80;
            color: #000;
        }

        .btn-register {
            background: linear-gradient(45deg, #22c55e, #4ade80);
            color: black;
        }

        .btn-register:hover {
            transform: scale(1.05);
        }

        /* MAIN */
        .main-wrapper {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 20px;
        }

        /* CARD SYSTEM */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* PRODUCT */
        .product-img {
            width: 100%;
            border-radius: 15px;
            height: 200px;
            object-fit: cover;
        }

        .product-title {
            margin-top: 10px;
            font-weight: 700;
        }

        .product-price {
            color: #4ade80;
            font-weight: bold;
        }

        /* BUTTON MAIN */
        .btn-main {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background: linear-gradient(45deg, #22c55e, #4ade80);
            border-radius: 10px;
            text-align: center;
            color: black;
            font-weight: 600;
        }

        /* ANIMATION */
        .fade-in {
            animation: fade 0.6s ease-in-out;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* TITLE */
        .auth-card h2 {
            margin-bottom: 20px;
        }

        /* INPUT */
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        .auth-card input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 2px #dcfce7;
        }

        /* BUTTON */
        .btn-main {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2ecc71;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: #27ae60;
        }

        /* GOOGLE */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #f8f9fa;
        }

        /* DIVIDER */
        .divider {
            margin: 15px 0;
            position: relative;
            text-align: center;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #777;
            font-size: 13px;
        }

        .divider::before {
            content: '';
            height: 1px;
            width: 100%;
            background: #eee;
            position: absolute;
            top: 50%;
            left: 0;
        }

        /* LINK */
        .auth-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .auth-link a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="{% url 'product_list' %}" class="logo">Green<span>Shop</span></a>

            <div class="nav-right">
                <a href="{% url 'product_list' %}" class="nav-icon">
                    <i class="fa fa-home"></i>
                </a>

                {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="user-pill">
                    <i class="fa fa-user"></i> {{ user.username }}
                </a>

                <a href="{% url 'order_list' %}" class="nav-icon">
                    <i class="fa fa-shopping-cart"></i>
                </a>

                <form action="{% url 'logout' %}" method="POST">
                    {% csrf_token %}
                    <button class="nav-icon" style="background:none;border:none;">
                        <i class="fa fa-sign-out-alt"></i>
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-login">Login</a>
                <a href="{% url 'register' %}" class="btn btn-register">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-wrapper">
        {% block content %} {% endblock %}
    </main>
</body>

</html>
