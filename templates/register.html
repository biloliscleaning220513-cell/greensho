{% extends 'base.html' %}
{% load socialaccount %}
{% block content %}

<div class="form-wrapper">
    <div class="auth-card">

        <h2>📝 Ro'yxatdan o'tish</h2>

        <a href="{% provider_login_url 'google' process='signup' %}" class="google-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="20">
            Google orqali ro'yxatdan o'tish
        </a>

        <div class="divider"><span>yoki</span></div>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <input type="{{ field.field.widget.input_type }}"
                       name="{{ field.name }}"
                       placeholder="{{ field.label }}"
                       value="{{ field.value|default:'' }}">
            {% endfor %}

            <button class="btn-main">Hisob ochish</button>
        </form>

        <p class="auth-link">
            Akkount bormi?
            <a href="{% url 'login' %}">Kirish</a>
        </p>

    </div>
</div>

{% endblock %}
