{% extends 'base.html' %}

{% block content %}
<style>
    /* MAHSULOTLARNI O'RTAGA YIG'ISH - CONTAINERSIZ */
    .product-section {
        display: flex;
        flex-direction: column;
        align-items: center; /* Hamma narsani markazga suradi */
        width: 100%;
    }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Avtomatik moslashuv */
        gap: 30px;
        width: 100%;
        max-width: 1200px; /* Faqat grid kengligi chegaralangan, konteyner emas */
        margin-top: 20px;
    }

    .card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #eee;
        transition: 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

    .img-box {
        height: 220px; background: #fff; padding: 15px;
        display: flex; align-items: center; justify-content: center;
    }
    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-body h3 { font-size: 1.1rem; color: #333; margin-bottom: 10px; height: 45px; overflow: hidden; }
    .price { color: #2ecc71; font-weight: 800; font-size: 1.3rem; margin-bottom: 15px; }

    .btn-buy {
        background: #f8f9fa; color: #2ecc71; border: 2px solid #2ecc71;
        text-align: center; padding: 12px; border-radius: 12px;
        text-decoration: none; font-weight: 700; margin-top: auto;
    }
    .btn-buy:hover { background: #2ecc71; color: white; }
</style>

<div class="product-section">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="font-weight: 800; color: #333;">Sifatli mahsulotlar</h1>
        <p style="color: #666;">Barcha mahsulotlar o'rtaga tartiblandi</p>
    </div>

    <div class="product-grid">
        {% for product in products %}
        <div class="card">
            <div class="img-box">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                {% else %}
                    <i class="fa fa-image fa-4x" style="color:#eee;"></i>
                {% endif %}
            </div>
            <div class="card-body">
                <h3>{{ product.name }}</h3>
                <p class="price">{{ product.price }} so'm</p>
                <a href="{% url 'product_detail' product.pk %}" class="btn-buy">Sotib olish</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
